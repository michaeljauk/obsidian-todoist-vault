name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  check:
    name: Typecheck, lint & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun run test

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            See [CHANGELOG](https://github.com/michaeljauk/obsidian-todoist-vault/blob/main/CHANGELOG.md) for details.

            **Manual installation:**
            1. Download `main.js` and `manifest.json` below.
            2. Copy both into `<vault>/.obsidian/plugins/obsidian-todoist-vault/`.
            3. Enable the plugin in **Settings → Community plugins**.
          files: |
            main.js
            manifest.json
