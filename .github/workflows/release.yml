name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  check:
    name: Typecheck, lint & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun run test

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Extract release notes
        run: |
          VERSION="${{ github.ref_name }}"

          # Extract this version's section from CHANGELOG.md
          awk "
            /^## \[$VERSION\]/ { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          " CHANGELOG.md > release_notes.md

          # Auto-generate contributors from git log since previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${VERSION}"
          else
            RANGE="${VERSION}"
          fi
          CONTRIBUTORS=$(git log "$RANGE" --format='%aN' | sort -u | sed 's/^/- /')
          if [ -n "$CONTRIBUTORS" ]; then
            echo "" >> release_notes.md
            echo "### Contributors" >> release_notes.md
            echo "$CONTRIBUTORS" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "**Manual installation:**" >> release_notes.md
          echo "1. Download \`main.js\`, \`manifest.json\`, and \`styles.css\` below." >> release_notes.md
          echo "2. Copy all three into \`<vault>/.obsidian/plugins/obsidian-todoist-vault/\`." >> release_notes.md
          echo "3. Enable the plugin in **Settings → Community plugins**." >> release_notes.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            main.js
            manifest.json
            styles.css
